name: Flutter 多平台构建发布

# 推送Tag时触发
on:
  push:
    tags:
      - "v*"

# 并发控制：相同标签只运行一次构建
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 版本信息预处理（只运行一次，供其他job使用）
  preprocess:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_desc: ${{ steps.version.outputs.version_desc }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      
      - name: 读取版本信息
        id: version
        run: |
          content=$(cat assets/app_version.json)
          version=$(echo "$content" | jq -r '.version')
          version_desc=$(echo "$content" | jq -r '.version_desc')
          prerelease=$(echo "$content" | jq -r '.prerelease')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "version_desc=$version_desc" >> $GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $GITHUB_OUTPUT
        shell: bash

  # 打包macOS、iOS和Android
  build-mac-ios-android:
    needs: preprocess
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # 签出代码（使用触发构建的标签版本）
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，便于版本号处理

      # APK签名设置
      - name: 下载Android签名文件
        id: android_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}
        timeout-minutes: 5

      - name: 创建key.properties
        run: |
          echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > simple_live_app/android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> simple_live_app/android/key.properties
        timeout-minutes: 2
     
      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17"
          cache: 'gradle'

      # 设置Flutter
      - name: 配置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          cache: true 

      # 打开MAC Desktop支持
      - name: 启用Flutter桌面支持
        run: flutter config --enable-macos-desktop
        timeout-minutes: 2

      # 更新Flutter的packages
      - name: 恢复依赖包
        run: |
          cd simple_live_app
          flutter pub get
        timeout-minutes: 10

      # 安装appdmg
      - name: 安装appdmg工具
        run: npm install -g appdmg
        timeout-minutes: 5

      # 设置flutter_distributor环境
      - name: 安装flutter_distributor
        run: dart pub global activate flutter_distributor
        timeout-minutes: 5

      # 打包APK
      - name: 构建Android APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi
        timeout-minutes: 30
      
      # 上传APK至Artifacts
      - name: 上传APK制品
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 14

      # 打包iOS
      - name: 构建iOS应用
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign
        timeout-minutes: 30
      
      # 创建未签名ipa
      - name: 生成IPA文件
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload
          cd ../../..
        timeout-minutes: 5
      
      # 上传IPA至Artifacts
      - name: 上传IPA制品
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
          retention-days: 14
      
      # 打包MAC
      - name: 构建macOS应用
        run: |
          cd simple_live_app
          flutter_distributor package --platform macos --targets dmg,zip --skip-clean
        timeout-minutes: 30

      # 上传MAC至Artifacts
      - name: 上传macOS制品
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip
          retention-days: 14

      # 上传至Release
      - name: 上传到GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ needs.preprocess.outputs.version }}
          body: ${{ needs.preprocess.outputs.version_desc }}
          prerelease: ${{ needs.preprocess.outputs.prerelease }}
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip

  # 打包Linux
  build-linux:
    needs: preprocess
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # 签出代码
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 设置Flutter环境
      - name: 配置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          cache: true

      # 安装依赖
      - name: 更新系统依赖
        run: sudo apt-get update
        timeout-minutes: 10

      - name: 安装编译依赖
        run: sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev mpv
        timeout-minutes: 15

      # 打开Linux Desktop支持
      - name: 启用Linux桌面支持
        run: flutter config --enable-linux-desktop
        timeout-minutes: 2

      # 更新Flutter的packages
      - name: 恢复依赖包
        run: |
          cd simple_live_app
          flutter pub get
        timeout-minutes: 10

      # 设置flutter_distributor环境
      - name: 安装flutter_distributor
        run: dart pub global activate flutter_distributor
        timeout-minutes: 5

      # 构建Linux应用
      - name: 构建Linux安装包
        run: |
          cd simple_live_app
          flutter_distributor package --platform linux --targets deb,zip --skip-clean
        timeout-minutes: 30

      # 上传Linux包至Artifacts
      - name: 上传Linux制品
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip
          retention-days: 14

      # 上传至Release
      - name: 上传到GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ needs.preprocess.outputs.version }}
          body: ${{ needs.preprocess.outputs.version_desc }}
          prerelease: ${{ needs.preprocess.outputs.prerelease }}
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip

  # 打包Windows
  build-windows:
    needs: preprocess
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      # 签出代码
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 设置Flutter环境
      - name: 配置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          cache: true

      - name: 启用Windows桌面支持
        run: flutter config --enable-windows-desktop
        timeout-minutes: 2

      - name: 恢复依赖包
        run: |
          cd simple_live_app
          flutter pub get
        timeout-minutes: 10

      # 设置flutter_distributor环境
      - name: 安装flutter_distributor
        run: dart pub global activate flutter_distributor
        timeout-minutes: 5

      # 构建Windows应用
      - name: 构建Windows安装包
        run: |
          cd simple_live_app
          flutter_distributor package --platform windows --targets msix,zip --skip-clean
        timeout-minutes: 30

      # 上传Windows至Artifacts
      - name: 上传Windows制品
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip
          retention-days: 14

      # 上传至Release
      - name: 上传到GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ needs.preprocess.outputs.version }}
          body: ${{ needs.preprocess.outputs.version_desc }}
          prerelease: ${{ needs.preprocess.outputs.prerelease }}
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip
